<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANEMO — Generative Drift + ScaleXY Fill</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,slnt,wdth,wght,GRAD,XOPQ,XTRA,YOPQ,YTUC@8..144,-10..0,25..151,100..1000,-200..150,27..175,323..603,25..135,528..760&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gunmetal: #1F2627;
    --outer-space: #364245;
    --bittersweet: #F25C54;
    --dun: #D6C5AB;
    --bone: #EBE2D6;
    --page-padding: clamp(16px, 3vw, 48px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--gunmetal);
    color: var(--bone);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* --- Controls --- */
  .controls {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 14px 24px;
    background: rgba(31, 38, 39, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--outer-space);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-wrap: wrap;
  }
  .controls .title {
    color: var(--bittersweet);
    letter-spacing: 0.15em;
    white-space: nowrap;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .control-group label {
    color: var(--dun);
    opacity: 0.6;
    white-space: nowrap;
  }
  .control-group input[type="range"] {
    width: 80px;
    accent-color: var(--bittersweet);
  }
  .control-group .value {
    color: var(--bone);
    min-width: 44px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .btn {
    padding: 5px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dun);
    background: none;
    border: 1px solid var(--outer-space);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--bittersweet); color: var(--bittersweet); }
  .btn.active { border-color: var(--bittersweet); background: var(--bittersweet); color: var(--gunmetal); }

  /* --- Hero container --- */
  .hero {
    width: 100%;
    height: 50vh;
    padding: var(--page-padding);
    margin-top: 52px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }

  .word {
    display: flex;
    align-items: baseline;
    white-space: nowrap;
    transform-origin: top left;
    /* Spring easing for scale transitions */
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .char {
    font-family: 'Roboto Flex', sans-serif;
    text-transform: uppercase;
    font-size: 100px; /* base size — scale handles the rest */
    letter-spacing: -0.03em;
    line-height: 0.85;
    color: var(--dun);
    display: inline-block;
    will-change: font-variation-settings;
  }

  /* --- Progress bar --- */
  .progress-track {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--outer-space);
    z-index: 101;
  }
  .progress-bar {
    height: 100%;
    background: var(--bittersweet);
    width: 0%;
    transition: width 0.1s linear;
  }

  /* --- Info --- */
  .info {
    position: fixed;
    bottom: 4px;
    left: 24px;
    z-index: 102;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dun);
    opacity: 0.3;
    font-variant-numeric: tabular-nums;
    display: flex;
    gap: 16px;
  }
  .info span { color: var(--bone); opacity: 0.5; }

  /* --- Mobile preview --- */
  .mobile-section {
    padding: 48px var(--page-padding);
    border-top: 1px solid var(--outer-space);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .mobile-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bittersweet);
    align-self: flex-start;
  }
  .mobile-frame {
    width: 375px;
    height: 812px;
    border: 1px solid var(--outer-space);
    border-radius: 40px;
    overflow: hidden;
    background: var(--gunmetal);
    flex-shrink: 0;
  }
  .mobile-hero {
    width: 100%;
    height: 35%;
    padding: 24px 16px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }
  .mobile-word {
    transform-origin: top left;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .mobile-word .char {
    font-size: 60px;
  }

  /* --- Below content --- */
  .below {
    padding: 64px var(--page-padding);
    border-top: 1px solid var(--outer-space);
  }
  .below p {
    font-size: 13px;
    line-height: 1.6;
    color: var(--dun);
    opacity: 0.5;
    max-width: 560px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="controls">
  <span class="title">ScaleXY Fill</span>
  <div class="control-group">
    <label>Hold</label>
    <input type="range" id="holdSlider" min="3" max="30" value="8" step="1">
    <span class="value" id="holdVal">8s</span>
  </div>
  <div class="control-group">
    <label>Transition</label>
    <input type="range" id="transSlider" min="500" max="4000" value="1500" step="100">
    <span class="value" id="transVal">1.5s</span>
  </div>
  <div class="control-group">
    <label>Easing</label>
    <button class="btn ease-btn active" data-ease="spring">Spring</button>
    <button class="btn ease-btn" data-ease="smooth">Smooth</button>
    <button class="btn ease-btn" data-ease="steps">Steps</button>
  </div>
  <div class="control-group">
    <button class="btn" id="pauseBtn">Pause</button>
    <button class="btn" id="shuffleBtn">Shuffle</button>
  </div>
</div>

<header class="hero" id="hero">
  <div class="word" id="word"></div>
</header>

<!-- Mobile preview -->
<div class="mobile-section">
  <span class="mobile-label">Mobile Preview — 375×812 (iPhone)</span>
  <div class="mobile-frame">
    <div class="mobile-hero" id="mobileHero">
      <div class="word mobile-word" id="mobileWord"></div>
    </div>
  </div>
</div>

<div class="below">
  <p>Top: full browser width scaled on both axes. Below: a 375×812 mobile frame showing the same effect at phone proportions. Both run independently — each has its own generative cycle and scaleXY fitting.</p>
</div>

<div class="info">
  <span id="infoScale"></span>
  <span id="infoSize"></span>
</div>

<div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>

<script>
const LETTERS = 'JUANEMO'.split('');
const heroEl = document.getElementById('hero');
const wordEl = document.getElementById('word');
const progressBar = document.getElementById('progressBar');
const infoScale = document.getElementById('infoScale');
const infoSize = document.getElementById('infoSize');

// Desktop axis ranges — full expression
const AXIS_RANGES_DESKTOP = {
  wdth: { min: 25, max: 151 },
  wght: { min: 300, max: 900 },
  opsz: { min: 8, max: 144 },
};

// Mobile axis ranges — capped for readability
const AXIS_RANGES_MOBILE = {
  wdth: { min: 25, max: 100 },   // cap width — ultra-extended is too much at small scale
  wght: { min: 300, max: 650 },  // cap weight — ultra-bold gets illegible in the frame
  opsz: { min: 8, max: 100 },
};

let holdDuration = 8000;
let transDuration = 1500;
let paused = false;

const EASINGS = {
  spring: {
    axes: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
    scale: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
  },
  smooth: {
    axes: 'cubic-bezier(0.16, 1, 0.3, 1)',
    scale: 'cubic-bezier(0.16, 1, 0.3, 1)',
  },
  steps: {
    axes: 'steps(6)',
    scale: 'steps(8)',
  },
};
let currentEasing = 'spring';

function rand(min, max) { return Math.round(min + Math.random() * (max - min)); }

function randomAxes(ranges) {
  const r = ranges || AXIS_RANGES_DESKTOP;
  return {
    wdth: rand(r.wdth.min, r.wdth.max),
    wght: rand(r.wght.min, r.wght.max),
    opsz: rand(r.opsz.min, r.opsz.max),
  };
}

function axisString(a) {
  return `'wdth' ${a.wdth}, 'wght' ${a.wght}, 'opsz' ${a.opsz}`;
}

// Create character spans
const chars = LETTERS.map(letter => {
  const el = document.createElement('span');
  el.className = 'char';
  el.textContent = letter;
  const axes = randomAxes();
  el.style.fontVariationSettings = axisString(axes);
  wordEl.appendChild(el);
  return { el, axes };
});

// ============================================================
// FIT: scale word to fill container on BOTH axes
// Uses a hidden clone to measure natural size — no visible reset
// ============================================================

// Hidden measurement clone — same styles, invisible
const measureEl = wordEl.cloneNode(true);
measureEl.style.position = 'absolute';
measureEl.style.visibility = 'hidden';
measureEl.style.pointerEvents = 'none';
measureEl.style.transform = 'none';
measureEl.style.left = '0';
measureEl.style.top = '0';
measureEl.id = '';
heroEl.appendChild(measureEl);

// Keep clone's font-variation-settings in sync with real chars
function syncClone() {
  const cloneChars = measureEl.querySelectorAll('span');
  chars.forEach((c, i) => {
    if (cloneChars[i]) {
      cloneChars[i].style.fontVariationSettings = c.el.style.fontVariationSettings;
    }
  });
}

function fitWord() {
  const e = EASINGS[currentEasing];

  syncClone();
  // Force layout on the clone only
  void measureEl.offsetWidth;

  const naturalWidth = measureEl.scrollWidth;
  const naturalHeight = measureEl.getBoundingClientRect().height;

  const heroStyle = getComputedStyle(heroEl);
  const padLeft = parseFloat(heroStyle.paddingLeft);
  const padRight = parseFloat(heroStyle.paddingRight);
  const padTop = parseFloat(heroStyle.paddingTop);
  const padBottom = parseFloat(heroStyle.paddingBottom);

  const containerWidth = heroEl.clientWidth - padLeft - padRight;
  const containerHeight = heroEl.clientHeight - padTop - padBottom;

  if (naturalWidth <= 0 || naturalHeight <= 0) return;

  const scaleX = containerWidth / naturalWidth;
  const scaleY = containerHeight / naturalHeight;

  wordEl.style.transition = `transform 0.6s ${e.scale}`;
  wordEl.style.transform = `scale(${scaleX}, ${scaleY})`;

  // Info
  infoScale.textContent = `scaleX: ${scaleX.toFixed(2)}  scaleY: ${scaleY.toFixed(2)}`;
  infoSize.textContent = `${Math.round(containerWidth)}×${Math.round(containerHeight)}`;
}

// ResizeObserver on the hidden clone — fires as font-variation-settings
// cause glyph size changes, without any visible flash
const ro = new ResizeObserver(fitWord);
ro.observe(measureEl);
window.addEventListener('resize', fitWord);

// Initial fit
requestAnimationFrame(() => requestAnimationFrame(fitWord));

// ============================================================
// GENERATIVE DRIFT + HOLD CYCLE
// ============================================================

function shuffleAll() {
  const e = EASINGS[currentEasing];
  chars.forEach((c, i) => {
    const stagger = i * 80;
    const duration = transDuration + rand(-200, 200);
    setTimeout(() => {
      c.axes = randomAxes();
      c.el.style.transition = `font-variation-settings ${duration}ms ${e.axes}`;
      c.el.style.fontVariationSettings = axisString(c.axes);
      // Sync clone immediately so ResizeObserver picks up the change
      const cloneChars = measureEl.querySelectorAll('span');
      if (cloneChars[i]) {
        cloneChars[i].style.transition = `font-variation-settings ${duration}ms ${e.axes}`;
        cloneChars[i].style.fontVariationSettings = axisString(c.axes);
      }
    }, stagger);
  });
}

let cycleTimer;

function startTransition() {
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  shuffleAll();
  const totalTransTime = transDuration + (LETTERS.length * 80) + 200;
  cycleTimer = setTimeout(startHold, totalTransTime);
}

function startHold() {
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      progressBar.style.transition = `width ${holdDuration}ms linear`;
      progressBar.style.width = '100%';
    });
  });
  cycleTimer = setTimeout(() => {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    startTransition();
  }, holdDuration);
}

startHold();

// ============================================================
// CONTROLS
// ============================================================

document.getElementById('holdSlider').addEventListener('input', e => {
  holdDuration = parseInt(e.target.value) * 1000;
  document.getElementById('holdVal').textContent = e.target.value + 's';
});

document.getElementById('transSlider').addEventListener('input', e => {
  transDuration = parseInt(e.target.value);
  document.getElementById('transVal').textContent = (transDuration / 1000).toFixed(1) + 's';
});

document.querySelectorAll('.ease-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ease-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentEasing = btn.dataset.ease;
    fitWord();
  });
});

document.getElementById('pauseBtn').addEventListener('click', () => {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  btn.textContent = paused ? 'Resume' : 'Pause';
  btn.classList.toggle('active', paused);
  if (paused) {
    clearTimeout(cycleTimer);
    progressBar.style.transition = 'none';
  } else {
    startHold();
  }
});

document.getElementById('shuffleBtn').addEventListener('click', () => {
  clearTimeout(cycleTimer);
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  startTransition();
  // Also shuffle mobile
  mobileShuffleAll();
});

// ============================================================
// MOBILE PREVIEW — independent generative instance
// ============================================================

const mobileHeroEl = document.getElementById('mobileHero');
const mobileWordEl = document.getElementById('mobileWord');

// Create mobile chars — using mobile-capped ranges
const mobileChars = LETTERS.map(letter => {
  const el = document.createElement('span');
  el.className = 'char';
  el.textContent = letter;
  const axes = randomAxes(AXIS_RANGES_MOBILE);
  el.style.fontVariationSettings = axisString(axes);
  mobileWordEl.appendChild(el);
  return { el, axes };
});

// Mobile hidden clone
const mobileMeasure = mobileWordEl.cloneNode(true);
mobileMeasure.style.position = 'absolute';
mobileMeasure.style.visibility = 'hidden';
mobileMeasure.style.pointerEvents = 'none';
mobileMeasure.style.transform = 'none';
mobileMeasure.style.left = '0';
mobileMeasure.style.top = '0';
mobileMeasure.id = '';
mobileHeroEl.appendChild(mobileMeasure);

function fitMobileWord() {
  const cloneChars = mobileMeasure.querySelectorAll('span');
  mobileChars.forEach((c, i) => {
    if (cloneChars[i]) cloneChars[i].style.fontVariationSettings = c.el.style.fontVariationSettings;
  });
  void mobileMeasure.offsetWidth;

  const nw = mobileMeasure.scrollWidth;
  const nh = mobileMeasure.getBoundingClientRect().height;
  const s = getComputedStyle(mobileHeroEl);
  const cw = mobileHeroEl.clientWidth - parseFloat(s.paddingLeft) - parseFloat(s.paddingRight);
  const ch = mobileHeroEl.clientHeight - parseFloat(s.paddingTop) - parseFloat(s.paddingBottom);

  if (nw <= 0 || nh <= 0) return;
  const e = EASINGS[currentEasing];
  mobileWordEl.style.transition = `transform 0.6s ${e.scale}`;
  mobileWordEl.style.transform = `scale(${cw / nw}, ${ch / nh})`;
}

const mobileRo = new ResizeObserver(fitMobileWord);
mobileRo.observe(mobileMeasure);
requestAnimationFrame(() => requestAnimationFrame(fitMobileWord));

function mobileShuffleAll() {
  const e = EASINGS[currentEasing];
  mobileChars.forEach((c, i) => {
    const stagger = i * 80;
    const duration = transDuration + rand(-200, 200);
    setTimeout(() => {
      c.axes = randomAxes(AXIS_RANGES_MOBILE);
      c.el.style.transition = `font-variation-settings ${duration}ms ${e.axes}`;
      c.el.style.fontVariationSettings = axisString(c.axes);
      const cloneChars = mobileMeasure.querySelectorAll('span');
      if (cloneChars[i]) {
        cloneChars[i].style.transition = `font-variation-settings ${duration}ms ${e.axes}`;
        cloneChars[i].style.fontVariationSettings = axisString(c.axes);
      }
    }, stagger);
  });
}

// Mobile cycle — offset from desktop so they don't shift simultaneously
let mobileCycleTimer;
function mobileStartTransition() {
  mobileShuffleAll();
  const totalTransTime = transDuration + (LETTERS.length * 80) + 200;
  mobileCycleTimer = setTimeout(mobileStartHold, totalTransTime);
}
function mobileStartHold() {
  mobileCycleTimer = setTimeout(mobileStartTransition, holdDuration);
}
// Start offset by half the hold duration so desktop and mobile shift at different times
setTimeout(mobileStartHold, holdDuration / 2);
</script>

</body>
</html>
