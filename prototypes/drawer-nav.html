<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANEMO — Drawer Nav</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,slnt,wdth,wght,GRAD,XOPQ,XTRA,YOPQ,YTUC@8..144,-10..0,25..151,100..1000,-200..150,27..175,323..603,25..135,528..760&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gunmetal: #1F2627;
    --outer-space: #364245;
    --bittersweet: #F25C54;
    --dun: #D6C5AB;
    --bone: #EBE2D6;
    --pad: clamp(16px, 2.5vw, 32px);
    --keyline-dark: rgba(214, 197, 171, 0.12);
    --drawer-width: min(420px, 85vw);
    --drawer-speed: 0.45s;
    --drawer-ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--gunmetal);
  }

  /* ==========================================================
     SCENE — full viewport frame
     ========================================================== */
  .scene {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-rows: auto 1px auto 1fr 1px auto;
    background: var(--gunmetal);
    position: relative;
  }

  /* ==========================================================
     TOP BAR
     ========================================================== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--pad);
    position: relative;
    z-index: 30;
  }

  .topbar-date {
    position: absolute;
    left: var(--pad);
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dun);
    opacity: 0.25;
  }

  .logo {
    display: inline-flex;
    align-items: baseline;
    text-decoration: none;
    cursor: pointer;
  }
  .logo-char {
    font-family: 'Roboto Flex', sans-serif;
    text-transform: uppercase;
    font-size: 15px;
    line-height: 0.85;
    letter-spacing: -0.02em;
    color: var(--dun);
  }

  .grid-trigger {
    position: absolute;
    right: var(--pad);
    top: 50%;
    transform: translateY(-50%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
    z-index: 40;
    opacity: 0.35;
    transition: opacity 0.2s;
  }
  .grid-trigger:hover { opacity: 0.9; }
  .grid-trigger span {
    width: 5px;
    height: 5px;
    border-radius: 1px;
    background: var(--dun);
    display: block;
  }

  /* ==========================================================
     KEYLINES + METABAR
     ========================================================== */
  .keyline { width: 100%; background: var(--keyline-dark); }

  .metabar {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 20px var(--pad) 10px;
  }
  .meta-number {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bittersweet);
  }
  .meta-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dun);
    opacity: 0.5;
  }

  /* ==========================================================
     EXPERIMENT VIEWPORT
     ========================================================== */
  .viewport {
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--pad);
  }

  .gen-word {
    display: flex;
    align-items: baseline;
  }
  .gen-char {
    font-family: 'Roboto Flex', sans-serif;
    text-transform: uppercase;
    font-size: clamp(60px, 17vw, 280px);
    letter-spacing: -0.03em;
    line-height: 0.85;
    color: var(--dun);
    will-change: font-variation-settings;
    display: inline-block;
  }

  /* ==========================================================
     BOTTOM BAR
     ========================================================== */
  .bottombar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--pad);
    gap: 24px;
  }
  .bottom-desc {
    font-size: 11px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--dun);
    opacity: 0.35;
    max-width: 600px;
  }
  .bottom-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .ctrl { display: flex; align-items: center; gap: 6px; }
  .ctrl-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dun);
    opacity: 0.25;
  }
  .ctrl-btn {
    padding: 3px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dun);
    opacity: 0.45;
    background: none;
    border: 1px solid var(--keyline-dark);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { opacity: 0.8; border-color: rgba(214, 197, 171, 0.3); }
  .ctrl-btn.active { border-color: var(--bittersweet); color: var(--bittersweet); opacity: 0.9; }
  .dot-sep {
    width: 2px; height: 2px; border-radius: 50%;
    background: var(--dun); opacity: 0.2; flex-shrink: 0;
  }

  /* ==========================================================
     SCRIM — darkens the experiment when drawer is open
     ========================================================== */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--drawer-speed) var(--drawer-ease);
  }
  .drawer-open .scrim {
    opacity: 1;
    pointer-events: auto;
  }

  /* ==========================================================
     DRAWER — slides in from the right
     ========================================================== */
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: var(--drawer-width);
    background: var(--bone);
    z-index: 60;
    transform: translateX(100%);
    transition: transform var(--drawer-speed) var(--drawer-ease);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .drawer-open .drawer {
    transform: translateX(0);
  }

  /* Drawer header */
  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--pad);
    flex-shrink: 0;
  }
  .drawer-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gunmetal);
    opacity: 0.35;
  }
  .drawer-close {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid rgba(31, 38, 39, 0.1);
    border-radius: 3px;
    cursor: pointer;
    color: var(--gunmetal);
    opacity: 0.4;
    font-size: 14px;
    transition: opacity 0.2s, border-color 0.2s;
    line-height: 1;
  }
  .drawer-close:hover { opacity: 0.8; border-color: rgba(31, 38, 39, 0.25); }

  .drawer-keyline {
    width: 100%;
    height: 1px;
    background: rgba(31, 38, 39, 0.08);
    flex-shrink: 0;
  }

  /* Drawer scrollable list */
  .drawer-list {
    flex: 1;
    overflow-y: auto;
    padding: clamp(20px, 3vw, 32px) var(--pad);
    scrollbar-width: thin;
    scrollbar-color: rgba(31, 38, 39, 0.1) transparent;
  }
  .drawer-list::-webkit-scrollbar { width: 3px; }
  .drawer-list::-webkit-scrollbar-track { background: transparent; }
  .drawer-list::-webkit-scrollbar-thumb { background: rgba(31, 38, 39, 0.1); border-radius: 2px; }

  /* Month group */
  .month-group { margin-bottom: 32px; }
  .month-group:last-child { margin-bottom: 0; }
  .month-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gunmetal);
    opacity: 0.25;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(31, 38, 39, 0.06);
  }

  /* Experiment item in drawer */
  .drawer-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
  }
  .drawer-item:last-child { margin-bottom: 0; }
  .drawer-item:hover { background: rgba(31, 38, 39, 0.04); }
  .drawer-item.is-active { background: rgba(31, 38, 39, 0.06); }

  /* Thumbnail */
  .drawer-thumb {
    width: 56px;
    height: 36px;
    border-radius: 4px;
    background: var(--gunmetal);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .drawer-thumb .thumb-word {
    display: flex;
    align-items: baseline;
  }
  .drawer-thumb .thumb-char {
    font-family: 'Roboto Flex', sans-serif;
    text-transform: uppercase;
    font-size: 7px;
    letter-spacing: -0.02em;
    line-height: 0.85;
    color: var(--dun);
  }

  /* Item text */
  .drawer-item-text { flex: 1; min-width: 0; }
  .drawer-item-number {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--bittersweet);
    margin-right: 8px;
  }
  .drawer-item-name {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--gunmetal);
    opacity: 0.7;
  }
  .drawer-item.is-active .drawer-item-name { opacity: 1; }
  .drawer-item-desc {
    font-size: 10px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--gunmetal);
    opacity: 0.3;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ==========================================================
     CAROUSEL — special projects at the bottom of drawer
     ========================================================== */
  .carousel-section {
    flex-shrink: 0;
    border-top: 1px solid rgba(31, 38, 39, 0.08);
  }
  .carousel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px var(--pad) 12px;
  }
  .carousel-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gunmetal);
    opacity: 0.25;
  }
  .carousel-dots {
    display: flex;
    gap: 6px;
  }
  .carousel-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gunmetal);
    opacity: 0.12;
    transition: opacity 0.3s;
  }
  .carousel-dot.active { opacity: 0.4; }

  .carousel-track {
    overflow: hidden;
    position: relative;
  }
  .carousel-inner {
    display: flex;
    transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .carousel-slide {
    min-width: 100%;
    flex-shrink: 0;
    padding: 0 var(--pad) 20px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    cursor: pointer;
  }

  .carousel-thumb {
    width: 72px;
    height: 48px;
    border-radius: 5px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .carousel-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Placeholder colored thumbnails when no image */
  .carousel-thumb-color {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .carousel-thumb-color span {
    font-family: 'DM Sans', sans-serif;
    font-size: 7px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    opacity: 0.7;
  }

  .carousel-text { flex: 1; min-width: 0; }
  .carousel-tag {
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bittersweet);
    opacity: 0.7;
    margin-bottom: 3px;
  }
  .carousel-name {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--gunmetal);
    opacity: 0.65;
    line-height: 1.3;
  }
  .carousel-desc {
    font-size: 10px;
    font-weight: 400;
    color: var(--gunmetal);
    opacity: 0.25;
    margin-top: 2px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .carousel-slide:hover .carousel-name { opacity: 0.9; }

  /* ==========================================================
     MOBILE
     ========================================================== */
  @media (max-width: 600px) {
    .topbar-date { display: none; }
    .bottombar { display: none; }
    .scene { grid-template-rows: auto 1px auto 1fr 1px 0; }
    .drawer-item-desc { display: none; }
    .carousel-desc { display: none; }

    /* Full-screen drawer on mobile */
    .drawer {
      width: 100vw;
    }
  }
</style>
</head>
<body>

<div class="scene" id="scene">

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar-date" id="activeDate">March 2025</span>
    <a class="logo" id="logo"></a>
    <button class="grid-trigger" id="gridTrigger" aria-label="View experiments">
      <span></span><span></span><span></span><span></span>
    </button>
  </div>

  <!-- KEYLINE -->
  <div class="keyline"></div>

  <!-- META BAR -->
  <div class="metabar">
    <span class="meta-number" id="activeNumber">01</span>
    <span class="meta-title" id="activeTitle">Generative Typography</span>
  </div>

  <!-- EXPERIMENT VIEWPORT -->
  <div class="viewport" id="viewport">
    <div class="gen-word" id="activeWord"></div>
  </div>

  <!-- KEYLINE -->
  <div class="keyline"></div>

  <!-- BOTTOM BAR -->
  <div class="bottombar">
    <p class="bottom-desc" id="activeDesc">Per-character variable font drift using Roboto Flex's 13 axes. Each letter independently randomizes weight, width, and optical size on a timed hold → shift cycle with spring easing.</p>
    <div class="bottom-controls">
      <div class="ctrl">
        <span class="ctrl-label">Speed</span>
        <button class="ctrl-btn active" data-speed="2000">2s</button>
        <button class="ctrl-btn" data-speed="4000">4s</button>
        <button class="ctrl-btn" data-speed="8000">8s</button>
      </div>
      <div class="dot-sep"></div>
      <div class="ctrl">
        <span class="ctrl-label">Easing</span>
        <button class="ctrl-btn active" data-easing="spring">Spring</button>
        <button class="ctrl-btn" data-easing="smooth">Smooth</button>
      </div>
      <div class="dot-sep"></div>
      <button class="ctrl-btn" id="shuffleBtn">Shuffle</button>
    </div>
  </div>

  <!-- SCRIM -->
  <div class="scrim" id="scrim"></div>

  <!-- DRAWER -->
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-title">Experiments</span>
      <button class="drawer-close" id="drawerClose" aria-label="Close">✕</button>
    </div>
    <div class="drawer-keyline"></div>
    <div class="drawer-list" id="drawerList"></div>

    <!-- CAROUSEL — special projects -->
    <div class="carousel-section">
      <div class="carousel-header">
        <span class="carousel-label">Special Projects</span>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>
      <div class="carousel-track"><div class="carousel-inner" id="carouselInner"></div></div>
    </div>
  </div>

</div>

<script>
const LETTERS = 'JUANEMO'.split('');
const AXIS = { wdth: { min: 25, max: 151 }, wght: { min: 300, max: 900 }, opsz: { min: 8, max: 144 } };
const SPRING = 'cubic-bezier(0.34, 1.56, 0.64, 1)';
const SMOOTH = 'cubic-bezier(0.25, 0.46, 0.45, 0.94)';

let currentEasing = SPRING;
let currentSpeed = 2000;

function rand(a, b) { return Math.round(a + Math.random() * (b - a)); }
function rAxes() { return { wdth: rand(AXIS.wdth.min, AXIS.wdth.max), wght: rand(AXIS.wght.min, AXIS.wght.max), opsz: rand(AXIS.opsz.min, AXIS.opsz.max) }; }
function aStr(a) { return `'wdth' ${a.wdth}, 'wght' ${a.wght}, 'opsz' ${a.opsz}`; }

// --- EXPERIMENTS ---
const experiments = [
  { number: '01', name: 'Generative Typography', month: 'March 2025',
    desc: 'Per-character variable font drift — the wordmark is never the same twice.' },
  { number: '02', name: 'Axis Breathing', month: 'March 2025',
    desc: 'All axes animate in unison on a slow inhale/exhale cycle.' },
  { number: '03', name: 'Hollow Forms', month: 'April 2025',
    desc: 'Stroked letterforms with transparent fill — structure without weight.' },
  { number: '04', name: 'Gradient Fill', month: 'April 2025',
    desc: 'Shifting color gradient mapped across the wordmark surface.' },
  { number: '05', name: 'Layered Echo', month: 'May 2025',
    desc: 'Stacked instances at staggered delay — typographic afterimage.' },
  { number: '06', name: 'Proximity Response', month: 'May 2025',
    desc: 'Letters react to cursor proximity — bold and extended when near.' },
  { number: '07', name: 'Freeze Frame', month: 'June 2025',
    desc: 'Click letters to freeze them in place. Compose your own wordmark.' },
];

let activeIndex = 0;
const scene = document.getElementById('scene');

// --- LOGO ---
const logo = document.getElementById('logo');
LETTERS.forEach(l => {
  const s = document.createElement('span');
  s.className = 'logo-char';
  s.textContent = l;
  s.style.fontVariationSettings = aStr(rAxes());
  logo.appendChild(s);
});

// --- ACTIVE EXPERIMENT WORD ---
const activeWordEl = document.getElementById('activeWord');
LETTERS.forEach(l => {
  const s = document.createElement('span');
  s.className = 'gen-char';
  s.style.fontVariationSettings = aStr(rAxes());
  s.textContent = l;
  activeWordEl.appendChild(s);
});

// --- DRIFT ---
let driftTimers = [];

function startDrift() {
  stopDrift();
  const chars = activeWordEl.querySelectorAll('.gen-char');
  function cycle() {
    chars.forEach((el, i) => {
      const t = setTimeout(() => {
        el.style.transition = `font-variation-settings ${currentSpeed * 0.75 + rand(-200, 200)}ms ${currentEasing}`;
        el.style.fontVariationSettings = aStr(rAxes());
      }, i * 80);
      driftTimers.push(t);
    });
    const next = setTimeout(cycle, currentSpeed * 4 + currentSpeed * 0.75 + LETTERS.length * 80);
    driftTimers.push(next);
  }
  cycle();
}

function stopDrift() {
  driftTimers.forEach(clearTimeout);
  driftTimers = [];
}

startDrift();

// --- BUILD DRAWER LIST ---
const drawerList = document.getElementById('drawerList');

// Group experiments by month
const grouped = {};
experiments.forEach((exp, i) => {
  if (!grouped[exp.month]) grouped[exp.month] = [];
  grouped[exp.month].push({ ...exp, index: i });
});

// Sort months chronologically
const monthOrder = [...new Set(experiments.map(e => e.month))];

monthOrder.forEach(month => {
  const group = document.createElement('div');
  group.className = 'month-group';

  const label = document.createElement('div');
  label.className = 'month-label';
  label.textContent = month;
  group.appendChild(label);

  grouped[month].forEach(exp => {
    const item = document.createElement('div');
    item.className = 'drawer-item' + (exp.index === 0 ? ' is-active' : '');
    item.dataset.index = exp.index;

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'drawer-thumb';
    const thumbWord = document.createElement('div');
    thumbWord.className = 'thumb-word';
    LETTERS.forEach(l => {
      const s = document.createElement('span');
      s.className = 'thumb-char';
      s.textContent = l;
      s.style.fontVariationSettings = aStr(rAxes());
      thumbWord.appendChild(s);
    });
    thumb.appendChild(thumbWord);
    item.appendChild(thumb);

    // Text
    const text = document.createElement('div');
    text.className = 'drawer-item-text';
    text.innerHTML = `
      <div><span class="drawer-item-number">${exp.number}</span><span class="drawer-item-name">${exp.name}</span></div>
      <div class="drawer-item-desc">${exp.desc}</div>
    `;
    item.appendChild(text);

    item.addEventListener('click', () => {
      selectExperiment(exp.index);
      closeDrawer();
    });

    group.appendChild(item);
  });

  drawerList.appendChild(group);
});

function selectExperiment(index) {
  activeIndex = index;
  const exp = experiments[index];

  // Update frame metadata
  document.getElementById('activeNumber').textContent = exp.number;
  document.getElementById('activeTitle').textContent = exp.name;
  document.getElementById('activeDate').textContent = exp.month;
  document.getElementById('activeDesc').textContent = exp.desc;

  // Update active state in drawer
  document.querySelectorAll('.drawer-item').forEach(el => {
    el.classList.toggle('is-active', parseInt(el.dataset.index) === index);
  });

  // Re-randomize the active word
  const chars = activeWordEl.querySelectorAll('.gen-char');
  chars.forEach(el => {
    el.style.transition = `font-variation-settings 600ms ${currentEasing}`;
    el.style.fontVariationSettings = aStr(rAxes());
  });

  stopDrift();
  startDrift();
}

// --- DRAWER OPEN/CLOSE ---
function openDrawer() { scene.classList.add('drawer-open'); }
function closeDrawer() { scene.classList.remove('drawer-open'); }

document.getElementById('gridTrigger').addEventListener('click', () => {
  if (scene.classList.contains('drawer-open')) closeDrawer();
  else openDrawer();
});

document.getElementById('scrim').addEventListener('click', closeDrawer);
document.getElementById('drawerClose').addEventListener('click', closeDrawer);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDrawer();
});

// --- CONTROLS ---
document.querySelectorAll('[data-speed]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentSpeed = parseInt(btn.dataset.speed);
    document.querySelectorAll('[data-speed]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    stopDrift();
    startDrift();
  });
});

document.querySelectorAll('[data-easing]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentEasing = btn.dataset.easing === 'spring' ? SPRING : SMOOTH;
    document.querySelectorAll('[data-easing]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('shuffleBtn').addEventListener('click', () => {
  const chars = activeWordEl.querySelectorAll('.gen-char');
  chars.forEach(el => {
    el.style.transition = `font-variation-settings 600ms ${currentEasing}`;
    el.style.fontVariationSettings = aStr(rAxes());
  });
});

// --- CAROUSEL — Special Projects ---
const specialProjects = [
  { tag: 'Report', name: 'The State of Creative Jobs', desc: 'Annual industry analysis of creative roles and hiring trends.',
    color: '#2D5A6B' },
  { tag: 'Case Study', name: 'Redesigning the Brief', desc: 'How we rebuilt the creative brief process at scale.',
    color: '#8B4A3C' },
  { tag: 'Talk', name: 'Variable Fonts & The Future of Type', desc: 'Conference talk on generative typography systems.',
    color: '#4A6741' },
  { tag: 'Tool', name: 'Axis Playground', desc: 'Interactive variable font explorer for designers.',
    color: '#6B5A8C' },
];

const carouselInner = document.getElementById('carouselInner');
const carouselDots = document.getElementById('carouselDots');
let currentSlide = 0;
let carouselInterval;

// Build slides
specialProjects.forEach((proj, i) => {
  const slide = document.createElement('div');
  slide.className = 'carousel-slide';

  slide.innerHTML = `
    <div class="carousel-thumb">
      <div class="carousel-thumb-color" style="background: ${proj.color}">
        <span>${proj.tag}</span>
      </div>
    </div>
    <div class="carousel-text">
      <div class="carousel-tag">${proj.tag}</div>
      <div class="carousel-name">${proj.name}</div>
      <div class="carousel-desc">${proj.desc}</div>
    </div>
  `;

  carouselInner.appendChild(slide);

  // Dot
  const dot = document.createElement('div');
  dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', (e) => {
    e.stopPropagation();
    goToSlide(i);
    resetCarouselTimer();
  });
  carouselDots.appendChild(dot);
});

function goToSlide(index) {
  currentSlide = index;
  carouselInner.style.transform = `translateX(-${currentSlide * 100}%)`;
  const dots = carouselDots.querySelectorAll('.carousel-dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
}

function resetCarouselTimer() {
  if (carouselInterval) {
    stopCarousel();
    startCarousel();
  }
}

function nextSlide() {
  goToSlide((currentSlide + 1) % specialProjects.length);
}

// Auto-rotate every 4 seconds
function startCarousel() {
  stopCarousel();
  carouselInterval = setInterval(nextSlide, 4000);
}

function stopCarousel() {
  if (carouselInterval) clearInterval(carouselInterval);
}

// Start when drawer opens, stop when closed
const origOpen = openDrawer;
const origClose = closeDrawer;

openDrawer = function() {
  scene.classList.add('drawer-open');
  startCarousel();
};

closeDrawer = function() {
  scene.classList.remove('drawer-open');
  stopCarousel();
};

// Re-bind event listeners with updated functions
document.getElementById('gridTrigger').onclick = () => {
  if (scene.classList.contains('drawer-open')) closeDrawer();
  else openDrawer();
};
document.getElementById('scrim').onclick = closeDrawer;
document.getElementById('drawerClose').onclick = closeDrawer;
</script>
